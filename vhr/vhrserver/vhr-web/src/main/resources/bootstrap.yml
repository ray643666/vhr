spring:
  application:
    name: vhr-web                    # 服务名，对应 Nacos 中 Data ID 的前缀
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}  # Nacos 服务地址
        file-extension: yaml         # 配置文件格式，支持 yaml/properties
        namespace: ${NACOS_NAMESPACE:public}            # 命名空间，默认 public，多环境可自行创建
        group: ${NACOS_GROUP:DEFAULT_GROUP}         # 分组，默认即可
        refresh-enabled: true        # 开启配置自动刷新（关键）